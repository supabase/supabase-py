[tool.uv.workspace]
members = [
  "src/realtime",
  "src/functions",
  "src/supabase",
  "src/storage",
  "src/postgrest",
  "src/auth",
]

[tool.uv.sources]
realtime            = { workspace = true }
supabase_functions  = { workspace = true }
supabase_auth       = { workspace = true }
storage             = { workspace = true }
postgrest           = { workspace = true }
supabase            = { workspace = true }

[tool.pytest.ini_options]
asyncio_mode = "auto"

[tool.ruff]
target-version = "py39"
line-length = 88

[tool.ruff.lint]
select = [
  "E",   # pycodestyle
  "F",   # pyflakes
  "UP",  # pyupgrade
  "B",   # flake8-bugbear
  "I",   # isort
  "ANN"  # type annotations
]

ignore = [
  "F403", # star imports
  "E501", # line too long (handled by formatter)
  "E402", # import not at top
  "UP006",
  "UP035"
]

[tool.ruff.lint.isort]
known-first-party = ["realtime", "functions", "supabase", "storage", "postgrest", "auth"]

[tool.ruff.lint.pyupgrade]
keep-runtime-typing = true
